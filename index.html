<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>730任务及问题清单 — 江河海一体化调度平台</title>
<style>
:root {
  --primary:#1565C0;--primary-dark:#0D47A1;--primary-light:#E3F2FD;
  --danger:#C62828;--danger-light:#FFEBEE;
  --success:#2E7D32;--success-light:#E8F5E9;
  --warning:#E65100;--warning-light:#FFF3E0;
  --purple:#6A1B9A;--purple-light:#F3E5F5;
  --gray-50:#FAFAFA;--gray-100:#F5F5F5;--gray-200:#EEEEEE;
  --gray-300:#E0E0E0;--gray-400:#BDBDBD;--gray-500:#9E9E9E;
  --gray-600:#757575;--gray-700:#616161;--gray-800:#424242;--gray-900:#212121;
  --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.1);--shadow-md:0 4px 12px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:14px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--gray-100);color:var(--gray-900);line-height:1.5;min-height:100vh}

/* Header */
.header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:16px;position:sticky;top:0;z-index:200;box-shadow:var(--shadow-md)}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.header-title{font-size:17px;font-weight:700;line-height:1.3}
.header-sub{font-size:12px;opacity:.8;margin-top:2px}
.header-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
.hbtn{padding:6px 10px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.2);color:white}
.hbtn:active{background:rgba(255,255,255,.35)}
.header-date{font-size:12px;opacity:.7}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.stat-chip{background:rgba(255,255,255,.18);border-radius:8px;padding:6px 8px;text-align:center;cursor:pointer;transition:background .2s}
.stat-chip:active{background:rgba(255,255,255,.28)}
.stat-chip .s-label{font-size:10px;opacity:.8;display:block}
.stat-chip .s-num{font-size:20px;font-weight:700;line-height:1.2;display:block}
.stat-chip.critical{background:rgba(198,40,40,.35)}
.stat-chip.done{background:rgba(46,125,50,.35)}

/* Tab */
.tab-bar{display:flex;background:white;border-bottom:2px solid var(--gray-200);position:sticky;top:92px;z-index:199;box-shadow:var(--shadow)}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:14px;font-weight:600;color:var(--gray-500);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab .t-badge{background:var(--danger);color:white;font-size:10px;padding:1px 5px;border-radius:8px;font-weight:700}
.tab .t-badge.green{background:var(--success)}
.tab .t-badge.orange{background:var(--warning)}

/* Main */
.main{padding:12px;max-width:900px;margin:0 auto}

/* Search / Filter */
.search-box{display:flex;gap:8px;margin-bottom:12px}
.search-box input{flex:1;min-width:0;padding:9px 12px;border:2px solid var(--gray-300);border-radius:8px;font-size:13px;outline:none;background:white}
.search-box input:focus{border-color:var(--primary)}
.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;padding:5px 12px;border:2px solid var(--gray-300);border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:white;color:var(--gray-600);transition:all .15s;white-space:nowrap}
.fchip:active{transform:scale(.96)}
.fchip.active{background:var(--primary);color:white;border-color:var(--primary)}
.fchip.danger.active{background:var(--danger);border-color:var(--danger)}
.fchip.green.active{background:var(--success);border-color:var(--success)}
.fchip.orange.active{background:var(--warning);border-color:var(--warning)}
.fchip.purple.active{background:var(--purple);border-color:var(--purple)}

/* Category */
.cat{background:white;border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow);overflow:hidden}
.cat-head{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--gray-50);cursor:pointer;user-select:none;border-bottom:1px solid var(--gray-200)}
.cat-head:active{background:var(--primary-light)}
.cat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:white;flex-shrink:0}
.cat-title{font-size:14px;font-weight:700;flex:1}
.cat-meta{font-size:11px;color:var(--gray-500)}
.cat-badge{font-size:11px;padding:2px 7px;border-radius:10px;background:var(--gray-200);color:var(--gray-600);font-weight:600}
.cat-badge.done{background:var(--success-light);color:var(--success)}
.cat-arrow{font-size:16px;color:var(--gray-400);transition:transform .25s;flex-shrink:0}
.cat.collapsed .cat-arrow{transform:rotate(-90deg)}
.cat.collapsed .cat-body{display:none}

/* Card */
.card{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid var(--gray-100);background:white;cursor:pointer;transition:background .12s}
.card:last-child{border-bottom:none}
.card:active{background:var(--primary-light)}
.card.done-card{opacity:.65}
.card-num{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;margin-top:1px}
.card-body{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:600;line-height:1.4}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;white-space:nowrap;line-height:1.5}
.tag-cr{background:var(--danger-light);color:var(--danger)}
.tag-hi{background:var(--warning-light);color:var(--warning)}
.tag-no{background:var(--primary-light);color:var(--primary)}
.tag-src{background:var(--purple-light);color:var(--purple)}
.tag-bug{background:var(--danger-light);color:var(--danger)}
.tag-opt{background:var(--primary-light);color:var(--primary)}
.tag-new{background:var(--purple-light);color:var(--purple)}
.card-meta{font-size:11px;color:var(--gray-500);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.card-prob{font-size:12px;color:var(--danger);background:var(--danger-light);border-radius:5px;padding:4px 8px;margin-top:5px}
.card-action{font-size:12px;color:var(--success);background:var(--success-light);border-radius:5px;padding:4px 8px;margin-top:4px}
.card-note{font-size:11px;color:var(--gray-600);background:var(--warning-light);border-radius:5px;padding:4px 8px;margin-top:4px;border-left:3px solid var(--warning)}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.sbadge{font-size:11px;padding:3px 8px;border-radius:5px;font-weight:700;white-space:nowrap}
.sb-in{background:var(--warning-light);color:var(--warning)}
.sb-done{background:var(--success-light);color:var(--success)}
.sb-pend{background:var(--danger-light);color:var(--danger)}
.sb-confirm{background:var(--purple-light);color:var(--purple)}
.action-btns{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.card-btn{font-size:11px;padding:4px 8px;border-radius:5px;border:none;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.card-btn:active{transform:scale(.95)}
.btn-done{background:var(--success-light);color:var(--success);border:2px solid var(--success)}
.btn-restore{background:var(--primary-light);color:var(--primary);border:2px solid var(--primary)}
.btn-edit{background:var(--gray-100);color:var(--gray-600);border:2px solid var(--gray-300)}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;z-index:300;display:flex;gap:10px}
.fab-btn{width:52px;height:52px;border-radius:26px;border:none;font-size:22px;cursor:pointer;box-shadow:var(--shadow-md);transition:all .15s;display:flex;align-items:center;justify-content:center}
.fab-btn:active{transform:scale(.92)}
.fab-add{background:var(--primary);color:white}
.fab-add-menu{display:none;position:fixed;bottom:84px;right:24px;background:white;border-radius:12px;box-shadow:var(--shadow-lg);padding:8px;z-index:301;min-width:140px}
.fab-add-menu.show{display:block}
.fab-add-menu button{width:100%;padding:10px 14px;border:none;background:none;font-size:14px;font-weight:700;cursor:pointer;text-align:left;border-radius:8px;display:flex;gap:8px;align-items:center}
.fab-add-menu button:active{background:var(--primary-light)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:white;border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease;-webkit-overflow-scrolling:touch}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--gray-200);position:sticky;top:0;background:white;z-index:1}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--gray-100);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-close:active{background:var(--gray-300)}
.modal-bd{padding:16px}
.modal-info{background:var(--primary-light);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--primary);margin-bottom:14px;line-height:1.6}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field textarea,.field select{width:100%;padding:10px 12px;border:2px solid var(--gray-300);border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;min-height:44px;outline:none;transition:border-color .2s;background:white;line-height:1.5}
.field textarea{min-height:80px}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--primary)}
.status-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.sopt{padding:9px 6px;border:2px solid var(--gray-300);border-radius:8px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;background:white;color:var(--gray-600)}
.sopt:active{transform:scale(.95)}
.sopt.selected{border-color:var(--primary);background:var(--primary);color:white}
.sopt.done-opt.selected{border-color:var(--success);background:var(--success)}
.modal-footer{padding:12px 16px 20px;display:flex;gap:10px}
.btn{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-cancel{background:var(--gray-200);color:var(--gray-700)}
.btn-save{background:var(--primary);color:white}
.btn-save.done-btn-m{background:var(--success)}
.btn-delete{background:var(--danger-light);color:var(--danger);flex:0.5}
.modal-tabs{display:flex;border-bottom:2px solid var(--gray-200);margin-bottom:16px}
.mtab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--gray-500);border-bottom:3px solid transparent;transition:all .2s}
.mtab.active{color:var(--primary);border-bottom-color:var(--primary)}
.modal-panel{display:none}
.modal-panel.active{display:block}

/* Export/Import Modal */
.data-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1002;align-items:center;justify-content:center}
.data-modal-overlay.show{display:flex}
.data-modal{background:white;border-radius:16px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.data-modal h3{font-size:16px;font-weight:700;margin-bottom:12px}
.data-modal textarea{width:100%;min-height:120px;padding:10px;border:2px solid var(--gray-300);border-radius:8px;font-size:12px;font-family:monospace;resize:vertical}
.data-modal textarea:focus{border-color:var(--primary)}
.data-modal .dbtn-row{display:flex;gap:10px;margin-top:12px}
.data-modal .dbtn{padding:10px 16px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none}
.dbtn-export{background:var(--primary);color:white}
.dbtn-import{background:var(--success);color:white}
.dbtn-cancel{background:var(--gray-200);color:var(--gray-700)}
.dbtn-copy{background:var(--warning);color:white}

/* Empty / Footer */
.empty{text-align:center;padding:48px 16px;color:var(--gray-400);font-size:14px}
.empty-icon{font-size:48px;margin-bottom:12px}
.footer{text-align:center;padding:16px;font-size:11px;color:var(--gray-400)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray-800);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(min-width:768px){
  html{font-size:15px}
  .header{padding:20px 24px}
  .stats-row{max-width:600px}
  .main{padding:20px;max-width:860px}
  .modal{border-radius:16px;margin:auto;max-height:90vh}
  .fab{bottom:30px;right:30px}
  .fab-add-menu{bottom:90px;right:30px}
  .data-modal{border-radius:16px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">📋 730任务及问题清单</div>
      <div class="header-sub">广西水运江河海一体化调度平台 · 聚焦730系统完全上线</div>
    </div>
    <div class="header-right">
      <button class="hbtn" onclick="showDataModal('export')">📤 导出</button>
      <button class="hbtn" onclick="showDataModal('import')">📥 导入</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-chip" onclick="jumpTab('tasks')"><span class="s-label">全部任务</span><span class="s-num" id="statAllNum">0</span></div>
    <div class="stat-chip critical" onclick="jumpFilter('critical')"><span class="s-label">阻塞上线</span><span class="s-num" id="statCrNum">0</span></div>
    <div class="stat-chip" onclick="jumpTab('probs')"><span class="s-label">待处理问题</span><span class="s-num" id="statProbNum">0</span></div>
    <div class="stat-chip done" onclick="jumpTab('done')"><span class="s-label">已完成</span><span class="s-num" id="statDoneNum">0</span></div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab active" id="tabTasks" onclick="switchTab('tasks')">📌 任务<span class="t-badge" id="tabTaskBadge">0</span></button>
  <button class="tab" id="tabProbs" onclick="switchTab('probs')">🐛 问题<span class="t-badge orange" id="tabProbBadge">0</span></button>
  <button class="tab" id="tabDone" onclick="switchTab('done')">✅ 已完成<span class="t-badge green" id="tabDoneBadge">0</span></button>
</div>

<div class="main">
  <div id="tasksPanel">
    <div class="search-box"><input id="taskSearch" placeholder="搜索任务名称、内容、负责人…" /></div>
    <div class="filter-row" id="taskFilters">
      <div class="fchip active" data-f="all" onclick="setTaskFilter('all')">全部</div>
      <div class="fchip danger" data-f="critical" onclick="setTaskFilter('critical')">🔴 阻塞上线</div>
      <div class="fchip orange" data-f="high" onclick="setTaskFilter('high')">🟡 高优先</div>
      <div class="fchip purple" data-f="leader" onclick="setTaskFilter('leader')">📌 领导新增</div>
      <div class="fchip green" data-f="done" onclick="setTaskFilter('done')">✅ 已完成</div>
    </div>
    <div id="taskCats"></div>
    <div class="empty" id="taskEmpty" style="display:none"><div class="empty-icon">🎉</div><div>没有匹配的任务</div></div>
  </div>

  <div id="probsPanel" style="display:none">
    <div class="search-box"><input id="probSearch" placeholder="搜索问题描述、编号、提出单位…" /></div>
    <div class="filter-row" id="probFilters">
      <div class="fchip active" data-f="all" onclick="setProbFilter('all')">全部</div>
      <div class="fchip danger" data-f="bug" onclick="setProbFilter('bug')">🐛 系统BUG</div>
      <div class="fchip" data-f="opt" onclick="setProbFilter('opt')">⚙️ 功能优化</div>
      <div class="fchip purple" data-f="new" onclick="setProbFilter('new')">✨ 功能新增</div>
      <div class="fchip green" data-f="done" onclick="setProbFilter('done')">✅ 已解决</div>
    </div>
    <div id="probCats"></div>
    <div class="empty" id="probEmpty" style="display:none"><div class="empty-icon">🎉</div><div>没有匹配的问题</div></div>
  </div>

  <div id="donePanel" style="display:none">
    <div class="search-box"><input id="doneSearch" placeholder="搜索已完成项…" /></div>
    <div id="doneCats"></div>
    <div class="empty" id="doneEmpty" style="display:none"><div class="empty-icon">🎉</div><div>还没有已完成的项</div></div>
  </div>
</div>

<div class="footer">数据本地存储 · 刷新不丢失 · 导出可迁移 · 2026年7月 v4</div>

<!-- FAB -->
<div class="fab">
  <button class="fab-btn fab-add" onclick="toggleAddMenu()">➕</button>
</div>
<div class="fab-add-menu" id="addMenu">
  <button onclick="addItem('task')">📌 新增任务</button>
  <button onclick="addItem('prob')">🐛 新增问题</button>
</div>

<!-- Item Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-title" id="modalTitle">详情</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-tabs">
      <button class="mtab active" id="mtabDetail" onclick="switchMTab('detail')">📋 详情与状态</button>
      <button class="mtab" id="mtabEdit" onclick="switchMTab('edit')">✏️ 编辑内容</button>
    </div>
    <div class="modal-panel active" id="panelDetail">
      <div class="modal-bd">
        <div class="modal-info" id="modalInfo"></div>
        <div class="field"><label>当前状态</label><div class="status-grid" id="statusGrid"></div></div>
        <div class="field"><label>进度 / 备注</label><textarea id="noteInput" placeholder="今天做了什么…"></textarea></div>
        <div class="field" id="historyField" style="display:none"><label>历史记录</label><div id="historyList"></div></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn btn-save" id="modalSaveBtn" onclick="saveModal()">保存</button>
      </div>
    </div>
    <div class="modal-panel" id="panelEdit">
      <div class="modal-bd" id="editFields"></div>
      <div class="modal-footer">
        <button class="btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn btn-delete" onclick="deleteItem()">🗑 删除</button>
        <button class="btn btn-save" onclick="saveEdit()">💾 保存</button>
      </div>
    </div>
  </div>
</div>

<!-- Data Modal -->
<div class="data-modal-overlay" id="dataModal">
  <div class="data-modal">
    <h3 id="dataModalTitle">数据管理</h3>
    <div id="dataModalBody">
      <textarea id="dataTextarea" placeholder="JSON数据…"></textarea>
    </div>
    <div class="dbtn-row" id="dataBtnRow"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ 分类定义 ═══
const TASK_CATS=[
  {key:'data',icon:'📡',bg:'#2E7D32',title:'数据接入与信号对接'},
  {key:'network',icon:'🌐',bg:'#E65100',title:'网络专线与资源环境'},
  {key:'req',icon:'📋',bg:'#1565C0',title:'需求确认与业务对接'},
  {key:'go-live',icon:'🚀',bg:'#C62828',title:'系统上线与安全合规'},
  {key:'leader',icon:'📌',bg:'#6A1B9A',title:'领导意见新增项'},
];
const PROB_CATS=[
  {key:'core',icon:'⚡',bg:'#C62828',title:'调度核心 — 排档与调度流程'},
  {key:'fee',icon:'💰',bg:'#E65100',title:'收费与缴费管理'},
  {key:'monitor',icon:'📊',bg:'#1565C0',title:'监控与数据展示'},
  {key:'ship',icon:'🚢',bg:'#2E7D32',title:'船舶管理与报到'},
  {key:'other',icon:'📁',bg:'#9E9E9E',title:'其他待处理问题'},
];

  try{localStorage.setItem(SK,JSON.stringify({state,tasks:TASKS,problems:PROBLEMS}))}catch(e){}
}
function gs(id){return state[id]||{status:null,note:'',history:[]}}
function ss(id,st,note){
  const p=gs(id);
  const e={date:new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),status:st,note};
  state[id]={status:st,note,history:[...(p.history||[]),e]};

}
function isDone(s){return s==='已完成'||s==='已解决'}
function isHigh(p){return p==='critical'||p==='high'}
function isCrit(p){return p==='critical'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function nextProbId(){

// ═══ 渲染 ═══
function rtc(t,sa){
  const s=gs(t.id),st=s.status||'进行中',n=s.note||'',dn=isDone(st);
  const pm={critical:'tag-cr',high:'tag-hi',normal:'tag-no'},pt={critical:'阻塞上线',high:'高优先',normal:'常规推进'};
  const bm={'进行中':'sb-in','已完成':'sb-done','待处理':'sb-pend','已解决':'sb-done','待确认':'sb-confirm','不予处理':'sb-pend'};
  const eb=sa&&!dn?`<button class="card-btn btn-edit" onclick="event.stopPropagation();openEdit('task','${t.id}')">✏️</button>`:'';
  const db=sa&&!dn?`<button class="card-btn btn-done" onclick="event.stopPropagation();quickDone('task','${t.id}')">✅</button>`:'';
  const rb=sa&&dn?`<button class="card-btn btn-restore" onclick="event.stopPropagation();restoreItem('task','${t.id}')">↩️</button>`:'';
  return `<div class="card${dn?' done-card':''}" onclick="openModal('task','${t.id}')" data-pri="${t.pri}" data-src="${t.src}" data-done="${dn}" data-name="${t.name}">
    <div class="card-num" style="background:${dn?'var(--success-light)':'var(--primary-light)'};color:${dn?'var(--success)':'var(--primary)'}">${t.id.replace('T','')}</div>
    <div class="card-body"><div class="card-name">${t.name}</div>
      <div class="card-tags"><span class="tag ${pm[t.pri]}">${pt[t.pri]}</span>${t.src==='领导新增'?'<span class="tag tag-src">📌领导新增</span>':''}${n?'<span class="tag tag-hi">📝有备注</span>':''}</div>
      ${t.prob&&!dn?`<div class="card-prob">⚠️ ${t.prob}</div>`:''}${t.action&&!dn?`<div class="card-action">✅ ${t.action}</div>`:''}${n?`<div class="card-note">📝 ${n}</div>`:''}
      <div class="card-meta">${t.unit?`<span>负责：${t.unit}</span>`:''}${t.owner?`<span>负责人：${t.owner}</span>`:''}${s.history&&s.history.length?`<span>已更新${s.history.length}次</span>`:''}</div>
    </div>
    <div class="card-right"><span class="sbadge ${bm[st]||'sb-in'}">${st}</span><div class="action-btns">${eb}${db}${rb}</div></div></div>`;
}

function rpc(p,sa){
  const s=gs(p.id),st=s.status||'待处理',n=s.note||'',dn=isDone(st);
  const tm={bug:'tag-bug',opt:'tag-opt',new:'tag-new'},tt={bug:'系统BUG',opt:'功能优化',new:'功能新增'};
  const bm={'待处理':'sb-pend','已解决':'sb-done','待确认':'sb-confirm','不予处理':'sb-pend','进行中':'sb-in','已完成':'sb-done'};
  const eb=sa&&!dn?`<button class="card-btn btn-edit" onclick="event.stopPropagation();openEdit('prob','${p.id}')">✏️</button>`:'';
  const db=sa&&!dn?`<button class="card-btn btn-done" onclick="event.stopPropagation();quickDone('prob','${p.id}')">✅</button>`:'';
  const rb=sa&&dn?`<button class="card-btn btn-restore" onclick="event.stopPropagation();restoreItem('prob','${p.id}')">↩️</button>`:'';
  return `<div class="card${dn?' done-card':''}" onclick="openModal('prob','${p.id}')" data-type="${p.type}" data-done="${dn}" data-name="${p.desc}">
    <div class="card-num" style="background:${dn?'var(--success-light)':'var(--danger-light)'};color:${dn?'var(--success)':'var(--danger)'}">${p.num}</div>
    <div class="card-body"><div class="card-name">${p.desc}</div>
      <div class="card-tags"><span class="tag ${tm[p.type]}">${tt[p.type]}</span>${n?'<span class="tag tag-hi">📝有备注</span>':''}</div>
      <div class="card-meta">${p.module?`<span>模块：${p.module}</span>`:''}${p.unit?`<span>提出：${p.unit}</span>`:''}${p.date?`<span>时间：${p.date}</span>`:''}</div>
    </div>
    <div class="card-right"><span class="sbadge ${bm[st]||'sb-pend'}">${st}</span><div class="action-btns">${eb}${db}${rb}</div></div></div>`;
}

function renderAll(){
  let td=0,tc=0,pd=0;
  TASKS.forEach(t=>{const s=gs(t.id);if(isDone(s.status||'进行中'))td++;if(isCrit(t.pri))tc++});
  PROBLEMS.forEach(p=>{if(isDone(gs(p.id).status||'待处理'))pd++});
  document.getElementById('statAllNum').textContent=`${td}/${TASKS.length}`;
  document.getElementById('statCrNum').textContent=tc;
  document.getElementById('statProbNum').textContent=PROBLEMS.length-pd;
  document.getElementById('statDoneNum').textContent=td+pd;
  document.getElementById('tabTaskBadge').textContent=TASKS.length-td;
  document.getElementById('tabProbBadge').textContent=PROBLEMS.length-pd;
  document.getElementById('tabDoneBadge').textContent=td+pd;
  rtp();rpp();rdp();
}

function rtp(){
  const ce=document.getElementById('taskCats'),ee=document.getElementById('taskEmpty');
  const q=document.getElementById('taskSearch').value.toLowerCase().trim();
  let h='',v=0;
  TASK_CATS.forEach(c=>{
    const it=TASKS.filter(t=>{
      if(t.cat!==c.key)return false;
      if(q&&!(t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||(t.owner||'').toLowerCase().includes(q)||(t.unit||'').toLowerCase().includes(q)||(gs(t.id).note||'').toLowerCase().includes(q)))return false;
      const s=gs(t.id),st=s.status||'进行中',dn=isDone(st);
      if(taskFilter==='done'&&!dn)return false;if(taskFilter==='critical'&&!isCrit(t.pri))return false;
      if(taskFilter==='high'&&!isHigh(t.pri))return false;if(taskFilter==='leader'&&t.src!=='领导新增')return false;
      return true;
    });
    const cd=it.filter(t=>isDone(gs(t.id).status||'进行中')).length;
    if(it.length>0||!q){h+=`<div class="cat${it.length===0&&q?' collapsed':''}" data-cat="${c.key}">
      <div class="cat-head" onclick="toggleCat(this)"><div class="cat-icon" style="background:${c.bg}">${c.icon}</div>
      <div><div class="cat-title">${c.title}</div><div class="cat-meta">${cd}/${it.length} 已完成</div></div>
      <span class="cat-badge${cd>0&&cd===it.length?' done':''}">${it.length}项</span><span class="cat-arrow">▼</span></div>
      <div class="cat-body">${it.map(t=>rtc(t,true)).join('')}</div></div>`;}
    v+=it.length;
  });
  ce.innerHTML=h||'<div class="empty"><div class="empty-icon">📋</div><div>没有匹配的任务</div></div>';
  ee.style.display=v===0?'block':'none';
}

function rpp(){
  const ce=document.getElementById('probCats'),ee=document.getElementById('probEmpty');
  const q=document.getElementById('probSearch').value.toLowerCase().trim();
  let h='',v=0;
  PROB_CATS.forEach(c=>{
    const it=PROBLEMS.filter(p=>{
      if(p.cat!==c.key)return false;
      if(q&&!(p.desc.toLowerCase().includes(q)||(p.num+'').includes(q)||(p.unit||'').toLowerCase().includes(q)||(p.module||'').toLowerCase().includes(q)))return false;
      const s=gs(p.id),st=s.status||'待处理',dn=isDone(st);
      if(probFilter==='done'&&!dn)return false;if(probFilter==='bug'&&p.type!=='bug')return false;
      if(probFilter==='opt'&&p.type!=='opt')return false;if(probFilter==='new'&&p.type!=='new')return false;
      return true;
    });
    const cd=it.filter(p=>isDone(gs(p.id).status||'待处理')).length;
    if(it.length>0||!q){h+=`<div class="cat${it.length===0&&q?' collapsed':''}" data-cat="${c.key}">
      <div class="cat-head" onclick="toggleCat(this)"><div class="cat-icon" style="background:${c.bg}">${c.icon}</div>
      <div><div class="cat-title">${c.title}</div><div class="cat-meta">${cd}/${it.length} 已解决</div></div>
      <span class="cat-badge${cd>0&&cd===it.length?' done':''}">${it.length}项</span><span class="cat-arrow">▼</span></div>
      <div class="cat-body">${it.map(p=>rpc(p,true)).join('')}</div></div>`;}
    v+=it.length;
  });
  ce.innerHTML=h||'<div class="empty"><div class="empty-icon">🐛</div><div>没有匹配的问题</div></div>';
  ee.style.display=v===0?'block':'none';
}

function rdp(){
  const ce=document.getElementById('doneCats'),ee=document.getElementById('doneEmpty');
  const q=document.getElementById('doneSearch').value.toLowerCase().trim();
  const dt=TASKS.filter(t=>{const s=gs(t.id);if(!isDone(s.status||'进行中'))return false;if(q&&!(t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||(t.owner||'').toLowerCase().includes(q)))return false;return true});
  const dp=PROBLEMS.filter(p=>{const s=gs(p.id);if(!isDone(s.status||'待处理'))return false;if(q&&!(p.desc.toLowerCase().includes(q)||(p.num+'').includes(q)||(p.unit||'').toLowerCase().includes(q)))return false;return true});
  let h='';
  if(dt.length>0){h+=`<div class="cat"><div class="cat-head"><div class="cat-icon" style="background:#1565C0">📌</div><div><div class="cat-title">已完成任务</div><div class="cat-meta">${dt.length}项</div></div></div><div class="cat-body">${dt.map(t=>rtc(t,true)).join('')}</div></div>`}
  if(dp.length>0){h+=`<div class="cat"><div class="cat-head"><div class="cat-icon" style="background:#C62828">🐛</div><div><div class="cat-title">已解决问题</div><div class="cat-meta">${dp.length}项</div></div></div><div class="cat-body">${dp.map(p=>rpc(p,true)).join('')}</div></div>`}
  ce.innerHTML=h;ee.style.display=(dt.length+dp.length)==0?'block':'none';
}

function openModal(type,id){

function selSt(el,st){document.querySelectorAll('.sopt').forEach(s=>s.classList.remove('selected'));el.classList.add('selected');selectedStatus=st;document.getElementById('modalSaveBtn').className='btn btn-save'+(isDone(st)?' done-btn-m':'')}

function saveModal(){if(!curItem)return;const st=selectedStatus||(curType==='task'?'进行中':'待处理'),n=document.getElementById('noteInput').value.trim();ss(curItem.id,st,n);closeModal();renderAll();toast(`${curItem.id} 已${isDone(st)?'完成':'更新'}`)}
function quickDone(type,id){const item=type==='task'?TASKS.find(t=>t.id===id):PROBLEMS.find(p=>p.id===id);if(!item)return;const st=type==='task'?'已完成':'已解决',p=gs(id),h=p.history||[];h.push({date:new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),status:st,note:'快速标记完成'});state[id]={status:st,note:p.note||'',history:h};saveState();renderAll();toast(`${id} 已标记${st}`)}
function restoreItem(type,id){const item=type==='task'?TASKS.find(t=>t.id===id):PROBLEMS.find(p=>p.id===id);if(!item)return;const st=type==='task'?'进行中':'待处理',p=gs(id),h=p.history||[];h.push({date:new Date().toLocaleString('zh-CN',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),status:st,note:'从已完成恢复'});state[id]={status:st,note:p.note||'',history:h};saveState();renderAll();toast(`${id} 已恢复`)}

function saveEdit(){
  if(!curItem)return;
  if(curType==='task'){curItem.name=document.getElementById('ef_name').value.trim()||curItem.name;curItem.desc=document.getElementById('ef_desc').value.trim();curItem.prob=document.getElementById('ef_prob').value.trim();curItem.action=document.getElementById('ef_action').value.trim();curItem.unit=document.getElementById('ef_unit').value.trim();curItem.owner=document.getElementById('ef_owner').value.trim();curItem.pri=document.getElementById('ef_pri').value;curItem.cat=document.getElementById('ef_cat').value}
  else{const n=parseInt(document.getElementById('ef_num').value);if(n)curItem.num=n;curItem.desc=document.getElementById('ef_desc').value.trim();curItem.module=document.getElementById('ef_module').value.trim();curItem.unit=document.getElementById('ef_unit').value.trim();curItem.type=document.getElementById('ef_type').value;curItem.cat=document.getElementById('ef_cat').value}
  
  // 新增项要加入数组
  if(isNewItem){
    if(curType==='task'){if(!TASKS.find(t=>t.id===curItem.id))TASKS.push(curItem)}
    else{if(!PROBLEMS.find(p=>p.id===curItem.id))PROBLEMS.push(curItem)}
    isNewItem=false;
  }
  saveState();closeModal();renderAll();toast(`${curItem.id} 已保存`);
}

// ═══ 导出/导入 ═══
function showDataModal(mode){
  const dm=document.getElementById('dataModal');
  const tt=document.getElementById('dataModalTitle');
  const ta=document.getElementById('dataTextarea');
  const br=document.getElementById('dataBtnRow');
  
  if(mode==='export'){
    tt.textContent='📤 导出数据';
    const data={state,tasks:TASKS,problems:PROBLEMS,exportTime:new Date().toISOString()};
    ta.value=JSON.stringify(data,null,2);
    ta.readOnly=true;
    br.innerHTML=`<button class="dbtn dbtn-copy" onclick="copyData()">📋 复制到剪贴板</button><button class="dbtn dbtn-cancel" onclick="closeDataModal()">关闭</button>`;
  }else{
    tt.textContent='📥 导入数据';
    ta.value='';ta.readOnly=false;ta.placeholder='粘贴之前导出的JSON数据…';
    br.innerHTML=`<button class="dbtn dbtn-import" onclick="importData()">📥 导入</button><button class="dbtn dbtn-cancel" onclick="closeDataModal()">取消</button>`;
  }
  dm.classList.add('show');
}
function closeDataModal(){document.getElementById('dataModal').classList.remove('show')}
function copyData(){
  const ta=document.getElementById('dataTextarea');
  ta.select();document.execCommand('copy');
  toast('已复制到剪贴板！');
}
function importData(){
  const ta=document.getElementById('dataTextarea');
  try{
    const d=JSON.parse(ta.value);
    if(d.tasks)TASKS=d.tasks;
    if(d.problems)PROBLEMS=d.problems;
    if(d.state)state=d.state;
    saveState();closeDataModal();renderAll();toast('数据导入成功！');
  }catch(e){toast('导入失败：JSON格式错误');}
}

// ═══ Toast ═══
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// ═══ 搜索 ═══
document.getElementById('taskSearch').addEventListener('input',renderAll);
document.getElementById('probSearch').addEventListener('input',renderAll);
document.getElementById('doneSearch').addEventListener('input',renderAll);

// ═══ Init ═══
loadState();renderAll();
</script>
